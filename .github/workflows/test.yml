# RLS / integration test pipeline
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   - SUPABASE_URL                  e.g. https://uexptysnthwjxksrlxod.supabase.co
#   - SUPABASE_PUBLISHABLE_KEY      anon/publishable key (safe in client)
#   - SUPABASE_SERVICE_ROLE_KEY     service role key (server only — DO NOT log)
#
# Without these the test setup throws and the job fails fast — by design.

name: tests

on:
  push:
  pull_request:

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run integration tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run test
